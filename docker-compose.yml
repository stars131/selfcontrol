services:
  db:
    image: pgvector/pgvector:pg16
    container_name: selfcontrol-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: selfcontrol-redis
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: selfcontrol-api
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      APP_ENV: ${APP_ENV}
      API_HOST: ${API_HOST}
      API_PORT: ${API_PORT}
      STORAGE_DIR: /app/storage/uploads
      MEDIA_PROCESSING_MODE: ${MEDIA_PROCESSING_MODE}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS}
      RAG_CHUNK_SIZE_CHARS: ${RAG_CHUNK_SIZE_CHARS}
      RAG_CHUNK_OVERLAP_CHARS: ${RAG_CHUNK_OVERLAP_CHARS}
      RAG_SEARCH_LIMIT: ${RAG_SEARCH_LIMIT}
      PROCESSING_TMP_DIR: /app/storage/tmp
      PROVIDER_REQUEST_TIMEOUT_SECONDS: ${PROVIDER_REQUEST_TIMEOUT_SECONDS}
      REMOTE_MEDIA_RETRY_MAX_ATTEMPTS: ${REMOTE_MEDIA_RETRY_MAX_ATTEMPTS}
      REMOTE_MEDIA_RETRY_BACKOFF_SECONDS: ${REMOTE_MEDIA_RETRY_BACKOFF_SECONDS}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    volumes:
      - ./apps/api:/app/apps/api
      - ./storage:/app/storage
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: selfcontrol-worker
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      APP_ENV: ${APP_ENV}
      STORAGE_DIR: /app/storage/uploads
      MEDIA_PROCESSING_MODE: ${MEDIA_PROCESSING_MODE}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS}
      RAG_CHUNK_SIZE_CHARS: ${RAG_CHUNK_SIZE_CHARS}
      RAG_CHUNK_OVERLAP_CHARS: ${RAG_CHUNK_OVERLAP_CHARS}
      RAG_SEARCH_LIMIT: ${RAG_SEARCH_LIMIT}
      PROCESSING_TMP_DIR: /app/storage/tmp
      PROVIDER_REQUEST_TIMEOUT_SECONDS: ${PROVIDER_REQUEST_TIMEOUT_SECONDS}
      REMOTE_MEDIA_RETRY_MAX_ATTEMPTS: ${REMOTE_MEDIA_RETRY_MAX_ATTEMPTS}
      REMOTE_MEDIA_RETRY_BACKOFF_SECONDS: ${REMOTE_MEDIA_RETRY_BACKOFF_SECONDS}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      - db
      - redis
    volumes:
      - ./apps/api:/app/apps/api
      - ./storage:/app/storage
    command: celery -A app.worker.celery_app worker --loglevel=info

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: selfcontrol-web
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
      NEXT_PUBLIC_AMAP_KEY: ${NEXT_PUBLIC_AMAP_KEY}
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./apps/web:/app/apps/web
    command: npm run dev -- --hostname 0.0.0.0 --port 3000

volumes:
  pg_data:
