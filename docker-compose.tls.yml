services:
  nginx:
    volumes:
      - ./infra/nginx/selfcontrol.generated.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/certbot/www:/var/www/certbot
      - ./infra/certbot/conf:/etc/letsencrypt
    ports:
      - "80:80"
      - "443:443"

  certbot:
    image: certbot/certbot:latest
    container_name: selfcontrol-certbot-prod
    restart: unless-stopped
    volumes:
      - ./infra/certbot/www:/var/www/certbot
      - ./infra/certbot/conf:/etc/letsencrypt
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "trap 'exit 0' TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h; done"
