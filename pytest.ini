[pytest]
addopts = -p no:tmpdir
norecursedirs =
    .git
    .next
    .pytest_cache
    .pytest-tmp
    apps/api/tests/_tmp_probe
    apps/api/tests/pytest-temp-run
    node_modules
    pytest-cache-files-*
    test-runtime-tmp
filterwarnings =
    ignore:'asyncio.iscoroutinefunction' is deprecated and slated for removal in Python 3.16; use inspect.iscoroutinefunction\(\) instead:DeprecationWarning:fastapi\.routing
