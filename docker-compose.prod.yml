services:
  db:
    image: pgvector/pgvector:pg16
    container_name: selfcontrol-db-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: selfcontrol-redis-prod
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: selfcontrol-api-prod
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      APP_ENV: ${APP_ENV}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      AUTO_CREATE_TABLES: ${AUTO_CREATE_TABLES}
      STORAGE_DIR: /app/storage/uploads
      MEDIA_PROCESSING_MODE: ${MEDIA_PROCESSING_MODE}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS}
      RAG_CHUNK_SIZE_CHARS: ${RAG_CHUNK_SIZE_CHARS}
      RAG_CHUNK_OVERLAP_CHARS: ${RAG_CHUNK_OVERLAP_CHARS}
      RAG_SEARCH_LIMIT: ${RAG_SEARCH_LIMIT}
      PROCESSING_TMP_DIR: /app/storage/tmp
      PROVIDER_REQUEST_TIMEOUT_SECONDS: ${PROVIDER_REQUEST_TIMEOUT_SECONDS}
      CORS_ORIGINS: ${CORS_ORIGINS}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      FORWARDED_ALLOW_IPS: ${FORWARDED_ALLOW_IPS}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./storage:/app/storage
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips=${FORWARDED_ALLOW_IPS}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: selfcontrol-worker-prod
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      APP_ENV: ${APP_ENV}
      AUTO_CREATE_TABLES: ${AUTO_CREATE_TABLES}
      STORAGE_DIR: /app/storage/uploads
      MEDIA_PROCESSING_MODE: ${MEDIA_PROCESSING_MODE}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS}
      RAG_CHUNK_SIZE_CHARS: ${RAG_CHUNK_SIZE_CHARS}
      RAG_CHUNK_OVERLAP_CHARS: ${RAG_CHUNK_OVERLAP_CHARS}
      RAG_SEARCH_LIMIT: ${RAG_SEARCH_LIMIT}
      PROCESSING_TMP_DIR: /app/storage/tmp
      PROVIDER_REQUEST_TIMEOUT_SECONDS: ${PROVIDER_REQUEST_TIMEOUT_SECONDS}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      FORWARDED_ALLOW_IPS: ${FORWARDED_ALLOW_IPS}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - ./storage:/app/storage
    command: celery -A app.worker.celery_app worker --loglevel=info

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: selfcontrol-web-prod
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
      NEXT_PUBLIC_AMAP_KEY: ${NEXT_PUBLIC_AMAP_KEY}
    depends_on:
      api:
        condition: service_healthy
    command: sh -c "npm run build && npm run start -- --hostname 0.0.0.0 --port 3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: selfcontrol-nginx-prod
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/selfcontrol.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pg_data:
  redis_data:
